<!-- wp:html -->
    <!-- HEADER -->
    <header>
        <div class="container navbar">

            <div class="logo">
                <a href="/">Food<span>Go</span></a>
            </div>

            <div class="menu" id="foodgoMenu">
                <a href="/">Trang chủ</a>
                <a href="/gioi-thieu">Giới thiệu</a>
                <a href="/dat-mon">Đặt món</a>
                <a href="/gio-hang">Giỏ hàng <span class="cart-count" style="background: #ff4d4f; color: white; border-radius: 50%; padding: 2px 6px !important; font-size: 12px; vertical-align: top; display: none;">0</span></a>
                <a href="/tai-khoan">Tài khoản</a>
                <a href="/lien-he">Liên hệ</a>
            </div>

            <div class="nav-right">
                <a href="/dat-mon" class="btn">Đặt Ngay</a>
                <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>

        </div>
    </header>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const hamburgerBtn = document.getElementById('hamburgerBtn');
            const menu = document.getElementById('foodgoMenu');
            
            if (hamburgerBtn && menu) {
                hamburgerBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    hamburgerBtn.classList.toggle('active');
                    menu.classList.toggle('active');
                });
                
                // Đóng menu khi click ra ngoài
                document.addEventListener('click', function(e) {
                    if (!menu.contains(e.target) && !hamburgerBtn.contains(e.target)) {
                        hamburgerBtn.classList.remove('active');
                        menu.classList.remove('active');
                    }
                });
                
                // Đóng menu khi click vào một menu item
                menu.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', () => {
                        hamburgerBtn.classList.remove('active');
                        menu.classList.remove('active');
                    });
                });
            }
        });
    </script>
<!-- /wp:html -->
